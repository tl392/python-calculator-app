<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FastAPI Calculator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">
<div class="card-body">

<h2 class="text-center mb-4">FastAPI Calculator</h2>

<form action="/calculate" method="post">

<div class="row mb-4">
<div class="col">
<label class="form-label">First Number</label>
<input type="number" step="any" name="a" id="a" class="form-control" required>
</div>

<div class="col">
<label class="form-label">Second Number</label>
<input type="number" step="any" name="b" id="b" class="form-control" required>
</div>
</div>


<div class="row g-2 text-center">

<div class="col-6 col-md-3">
<button type="submit"
name="operation"
value="add"
class="btn btn-success w-100">
Add
</button>
</div>

<div class="col-6 col-md-3">
<button type="submit"
name="operation"
value="subtract"
class="btn btn-warning w-100">
Subtract
</button>
</div>

<div class="col-6 col-md-3">
<button type="submit"
name="operation"
value="multiply"
class="btn btn-info w-100">
Multiply
</button>
</div>

<div class="col-6 col-md-3">
<button type="submit"
name="operation"
value="divide"
class="btn btn-danger w-100">
Divide
</button>
</div>

</div>

</form>


{% if result is not none %}
<div class="alert alert-success text-center mt-4">
<h4 id="result">Result: {{ result }}</h4>
</div>
{% endif %}

{% if error %}
<div class="alert alert-danger text-center mt-4">
<h4 id="error">Error: {{ error }}</h4>
</div>
{% endif %}


<div class="text-center mt-4">
<a href="/docs" class="btn btn-outline-dark">
Swagger API
</a>
</div>

</div>
</div>

</div>

</body>
</html>
